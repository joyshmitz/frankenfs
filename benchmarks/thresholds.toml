# ── Write Path family ───────────────────────────────────────────────────
# I/O-bound; variance from filesystem sync behavior and I/O scheduler.
# Family defaults: warn=12%, fail=25%, noise=5%.

[operation_thresholds.write_seq_4k]
warn_percent = 12
fail_percent = 25
noise_floor_percent = 5

[operation_thresholds.write_random_4k]
warn_percent = 12
fail_percent = 25
noise_floor_percent = 5

[operation_thresholds.fsync_single_write]
# fsync is sensitive to I/O scheduler decisions.
warn_percent = 15
fail_percent = 30
noise_floor_percent = 5

[operation_thresholds.fsync_batch_100]
# Batch fsync: more predictable than single due to amortization.
warn_percent = 12
fail_percent = 25
noise_floor_percent = 5

# ── Mount family ────────────────────────────────────────────────────────
# FUSE kernel roundtrip; high variance from system call scheduling.
# Family defaults: warn=25%, fail=50%, noise=10%.
# NOTE: Mount benchmarks are often "pending" on hosts without FUSE access.

[operation_thresholds.mount_cold]
warn_percent = 25
fail_percent = 50
noise_floor_percent = 10

[operation_thresholds.mount_warm]
warn_percent = 25
fail_percent = 50
noise_floor_percent = 10

[operation_thresholds.mount_recovery]
warn_percent = 25
fail_percent = 50
noise_floor_percent = 10

# ── Concurrency family (expanded) ──────────────────────────────────────
# Write amplification and multi-writer contention benchmarks.
# Thread-scheduling-sensitive; wide thresholds justified.

[operation_thresholds.wal_write_amplification_1block]
# taxonomy_id: wal_write_amplification_1block
# family: concurrency
# WAL overhead ratio for single-block transactions (higher overhead expected).
warn_percent = 15
fail_percent = 30
noise_floor_percent = 5

[operation_thresholds.wal_write_amplification_16block]
# taxonomy_id: wal_write_amplification_16block
# family: concurrency
# WAL overhead ratio for 16-block transactions (amortized, tighter).
warn_percent = 12
fail_percent = 25
noise_floor_percent = 5

[operation_thresholds.mvcc_contention_2writers]
# taxonomy_id: mvcc_contention_2writers
# family: concurrency
warn_percent = 15
fail_percent = 30
noise_floor_percent = 5

[operation_thresholds.mvcc_contention_4writers]
# taxonomy_id: mvcc_contention_4writers
# family: concurrency
warn_percent = 18
fail_percent = 35
noise_floor_percent = 8

[operation_thresholds.mvcc_contention_8writers]
# taxonomy_id: mvcc_contention_8writers
# family: concurrency
# 8 concurrent writers: scheduling variance dominates.
warn_percent = 20
fail_percent = 40
noise_floor_percent = 10

